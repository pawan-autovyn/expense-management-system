<label class="upload-field">
  <input type="file" accept="image/*" [disabled]="isUploading()" (change)="onFileSelected($event)" />
  <span class="upload-field__content">
    <app-icon name="upload" [size]="18" />
    <strong>{{ existingAttachment()?.name ?? 'Upload bill or receipt' }}</strong>
    <small>{{ isUploading() ? 'Uploading receipt...' : 'PNG, JPG or SVG preview supported' }}</small>
  </span>
</label>

@if (uploadError()) {
  <p class="upload-error" role="alert">{{ uploadError() }}</p>
}

@if (existingAttachment()) {
  <div class="upload-preview">
    <img [src]="existingAttachment()!.url" [alt]="existingAttachment()!.name" />
  </div>
}

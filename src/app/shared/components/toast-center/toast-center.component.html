@if (toasts().length) {
  <section class="toast-center" aria-live="polite" aria-atomic="true">
    @for (toast of toasts(); track toast.id) {
      <article class="toast-card" [ngClass]="'toast-card--' + toast.tone">
        <div class="toast-card__icon" aria-hidden="true">
          <app-icon [name]="resolveIcon(toast.tone)" [size]="18" />
        </div>

        <div class="toast-card__content">
          <strong>{{ toast.title }}</strong>
          <p>{{ toast.message }}</p>
        </div>

        <button type="button" class="toast-card__dismiss" (click)="dismiss(toast.id)" aria-label="Dismiss notification">
          <app-icon name="x" [size]="16" />
        </button>
      </article>
    }
  </section>
}

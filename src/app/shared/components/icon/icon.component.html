<svg
  [attr.width]="size()"
  [attr.height]="size()"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-linecap="round"
  stroke-linejoin="round"
  [attr.stroke-width]="strokeWidth()"
  aria-hidden="true"
>
  @for (path of paths(); track path) {
    <path [attr.d]="path" />
  }
</svg>

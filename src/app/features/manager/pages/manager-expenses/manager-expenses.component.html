    <section class="section-heading section-heading--page">
      <div>
        <p class="eyebrow">My Expenses</p>
        <h1>Personal submissions, drafts, and bill history</h1>
      </div>
    </section>

    <app-expense-filter-bar
      [filters]="filters()"
      [categories]="directoryService.categories()"
      (filtersChange)="filters.set($event)"
    />

    <div class="page-toolbar">
      <p class="muted">{{ rows().length }} records visible in the current filter set</p>
      <div class="page-toolbar__actions">
        <button type="button" class="button button--secondary" (click)="exportVisibleRows()">
          <app-icon name="download" [size]="16" />
          <span>Export CSV</span>
        </button>
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [actions]="actions"
      [rowTrackBy]="trackById"
      (actionTriggered)="handleAction($event)"
    />

    <app-confirm-dialog
      [open]="deleteDialogOpen()"
      message="Delete this draft expense from the current workspace?"
      (cancelled)="deleteDialogOpen.set(false)"
      (confirmed)="deleteDraft()"
    />

    <app-receipt-preview-modal
      [attachment]="selectedReceipt() ?? null"
      (closeRequested)="selectedReceipt.set(null)"
    />

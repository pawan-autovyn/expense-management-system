    <section class="section-heading section-heading--page">
      <div>
        <p class="eyebrow">My Expenses</p>
        <h1>Personal submissions and expense history</h1>
      </div>
    </section>

    <app-expense-filter-bar
      [filters]="filters()"
      [categories]="directoryService.categories()"
      [statuses]="visibleStatuses"
      (filtersChange)="updateFilters($event)"
    />

    <div class="page-toolbar">
      <p class="muted">{{ rows().length }} records visible in the current filter set</p>
      <div class="page-toolbar__actions">
        <button type="button" class="button button--secondary" (click)="exportVisibleRows()">
          <app-icon name="download" [size]="16" />
          <span>Download CSV</span>
        </button>
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="pagedRows()"
      [actions]="actions"
      [rowTrackBy]="trackById"
      (actionTriggered)="handleAction($event)"
    />

    <div class="page-toolbar">
      <p class="muted">Page {{ page() }} of {{ totalPages() }}</p>
      <div class="page-toolbar__actions">
        <button type="button" class="button button--secondary" [disabled]="page() === 1" (click)="previousPage()">
          Previous
        </button>
        <button
          type="button"
          class="button button--secondary"
          [disabled]="page() === totalPages()"
          (click)="nextPage()"
        >
          Next
        </button>
      </div>
    </div>

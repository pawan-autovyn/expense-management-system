    <section class="page-hero">
      <div>
        <h1>Add Expense</h1>
        <p>Submit a new expense for approval</p>
      </div>
    </section>

    <div class="ref-add-layout">
      <form class="glass-card form-card form-card--ref" [formGroup]="form">
        <div class="form-grid">
          <label class="form-grid__full">
            <span>Expense Title *</span>
            <input type="text" formControlName="title" placeholder="e.g., Highway toll charges" />
            @if (shouldShowError('title')) {
              <small class="form-error">Enter a title with at least 3 characters.</small>
            }
          </label>

          <label>
            <span>Category *</span>
            <select formControlName="categoryId">
              <option value="">Select category</option>
              @for (category of directoryService.categories(); track category.id) {
                <option [value]="category.id">{{ category.name }}</option>
              }
            </select>
            @if (shouldShowError('categoryId')) {
              <small class="form-error">Select the expense category.</small>
            }
          </label>

          <label>
            <span>Location *</span>
            <select formControlName="locationId">
              @for (location of locations(); track location.id) {
                <option [value]="location.id">{{ location.name }}</option>
              }
            </select>
            @if (shouldShowError('locationId')) {
              <small class="form-error">Choose the office location.</small>
            }
          </label>

          <label>
            <span>Amount (INR) *</span>
            <input type="number" formControlName="amount" placeholder="0.00" />
            @if (shouldShowError('amount')) {
              <small class="form-error">Amount should be greater than zero.</small>
            }
          </label>

          <label>
            <span>Date *</span>
            <input type="date" formControlName="date" />
            @if (shouldShowError('date')) {
              <small class="form-error">Choose the expense date.</small>
            }
          </label>

          <label>
            <span>Vendor / Shop Name</span>
            <input type="text" formControlName="vendor" placeholder="e.g., Shell Petrol Pump" />
            @if (shouldShowError('vendor')) {
              <small class="form-error">Vendor or shop name is required.</small>
            }
          </label>

          <div class="ref-form-spacer"></div>
        </div>

        <label class="form-grid__full">
          <span>Notes</span>
          <textarea
            formControlName="description"
            class="textarea"
            placeholder="Any additional details..."
          ></textarea>
          @if (shouldShowError('description')) {
            <small class="form-error">Add a short note with at least 8 characters.</small>
          }
        </label>

        <div class="tags-panel">
          <span>Tags</span>
          <div class="tag-list">
            @for (tag of currentTags(); track tag) {
              <span>{{ tag }}</span>
            }
          </div>
          <input type="text" formControlName="tags" placeholder="Add tag..." />
        </div>

        <div class="form-actions">
          <button type="button" class="button button--primary" (click)="submit()">
            Submit for Approval
          </button>
        </div>
      </form>

      <aside class="detail-stack detail-stack--sticky">
        <section class="glass-card ref-side-card">
          <h3>Upload Bill / Receipt</h3>
          <app-file-upload
            [existingAttachment]="attachment()"
            (attachmentChange)="attachment.set($event)"
          />
        </section>

        <section class="glass-card ref-side-card">
          <h3>Receipt Preview</h3>
          @if (attachment()) {
            <div class="upload-preview">
              <img [src]="attachment()!.url" [alt]="attachment()!.name" />
            </div>
          } @else {
            <div class="receipt-preview-placeholder">
              <app-icon name="eye" [size]="28" />
              <span>No receipt uploaded yet</span>
            </div>
          }
        </section>
      </aside>
    </div>

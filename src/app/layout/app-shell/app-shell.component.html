    <div class="app-shell" [class.app-shell--dialog-open]="hasWorkspaceOverlay()">
      <app-sidebar />

      <main class="app-shell__main">
        <app-topbar />
        <section class="app-shell__content">
          <router-outlet />
        </section>
      </main>

      <a
        class="floating-action"
        [routerLink]="quickActionRoute()"
        [attr.aria-label]="quickActionLabel()"
      >
        <app-icon name="plus-circle" [size]="22" />
        <span>{{ quickActionLabel() }}</span>
      </a>

      <app-toast-center />
      <app-expense-workspace-dialog />
      <app-confirm-dialog
        [open]="expenseDialogService.deleteDialogOpen()"
        title="Delete expense"
        [message]="expenseDialogService.deleteDialogMessage()"
        (cancelled)="expenseDialogService.cancelDelete()"
        (confirmed)="expenseDialogService.confirmDelete()"
      />
    </div>

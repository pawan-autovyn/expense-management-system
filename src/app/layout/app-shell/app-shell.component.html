    <div class="app-shell" [class.app-shell--dialog-open]="hasWorkspaceOverlay()">
      <app-sidebar />

      <main class="app-shell__main">
        <app-topbar />
        <section class="app-shell__content">
          <router-outlet />
        </section>
      </main>

      <a
        class="floating-action"
        [routerLink]="quickActionRoute()"
        [attr.aria-label]="quickActionLabel()"
      >
        <app-icon name="plus-circle" [size]="22" />
        <span>{{ quickActionLabel() }}</span>
      </a>

      <app-toast-center />
      <app-expense-workspace-dialog />
      <app-confirm-dialog
        [open]="expenseDialogService.deleteDialogOpen()"
        title="Delete expense"
        [message]="expenseDialogService.deleteDialogMessage()"
        hint="This action will permanently remove the selected record."
        confirmLabel="Delete"
        (cancelled)="expenseDialogService.cancelDelete()"
        (confirmed)="expenseDialogService.confirmDelete()"
      />
      <app-confirm-dialog
        [open]="confirmationDialogService.open()"
        [title]="confirmationDialogService.request()?.title ?? 'Confirm action'"
        [message]="confirmationDialogService.request()?.message ?? 'Confirm the selected action.'"
        [hint]="confirmationDialogService.request()?.hint ?? 'Please confirm before continuing.'"
        [confirmLabel]="confirmationDialogService.request()?.confirmLabel ?? 'Confirm'"
        [cancelLabel]="confirmationDialogService.request()?.cancelLabel ?? 'Cancel'"
        (cancelled)="confirmationDialogService.cancel()"
        (confirmed)="confirmationDialogService.confirm()"
      />
    </div>

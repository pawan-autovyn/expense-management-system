<header class="topbar glass-card">
  <div class="topbar__left">
    <div class="topbar__mark" aria-hidden="true">
      <app-icon name="dashboard" [size]="18" />
    </div>
    <div class="topbar__title">
      <span class="eyebrow topbar__eyebrow">Expense Management</span>
      <h1>Workspace</h1>
      <p>Clean role-based dashboard for daily approvals and expense tracking.</p>
    </div>
  </div>

  <div class="topbar__right">
    <span class="topbar__role">{{ roleLabel() }}</span>

    <div class="topbar__user">
      <div class="topbar__avatar" aria-hidden="true">{{ initials() }}</div>
      <div class="topbar__user-copy">
        <strong>{{ currentUser()?.name ?? 'Guest' }}</strong>
        <span>{{ currentUser()?.department ?? 'Session' }}</span>
      </div>
    </div>

    <button type="button" class="topbar__logout icon-button" (click)="logout()">
      <app-icon name="logout" [size]="18" />
      <span>Logout</span>
    </button>
  </div>
</header>
